# Excel 导出表头列注释词表
# key 与 backend/export_wide.py 中 _COL_NAMES 的英文列名一一对应
# 算法口径详见 docs/superpowers/specs/2026-05-31-stock-analysis-data-model.md §9

_common:
  author: Tradeanalysis
  footer: "`-`=当日无事件信号；`N/A`=不可算或历史不足。"
  weekly_prefix: "【周线】"
  # Excel 表头 Comment 弹窗尺寸（像素）；openpyxl 默认 108×79 仅显数行
  comment_width: 480
  comment_height: 300

columns:
  freq: |
    数据周期标识（daily/weekly）。导出宽表合并 sheet 中通常不展示。

  trade_date: |
    分析交易日（YYYYMMDD）。日线为当日；周线为对应 week-end 日期。

  ts_code: |
    tushare 标准代码（含交易所后缀，如 000001.SZ）。

  stock_code: |
    纯数字证券代码（无后缀），便于与通达信/同花顺等系统对齐。

  stock_name: |
    股票简称（dim_stock）。

  exchange: |
    上市交易所（上海/深圳/北京）。

  sector: |
    上市板（主板/创业板/科创板/北交所），基于股票代码前缀推导。

  tdx_industry_board: |
    TDX通达信行业分类（如银行、汽车制造、半导体等），以分析日为锚点，多板块以逗号分隔。数据源：tushare tdx_index/tdx_member。

  dc_concept_board: |
    DC东方财富概念板块分类（如新能源、人工智能、国企改革等），以分析日为锚点，多概念以逗号分隔。数据源：tushare dc_index/dc_member。注意：北交所(.BJ)股票无 DC 概念数据，此列固定显示 N/A。

  dc_theme_board: |
    东财题材分类（如雄安新区、钛白粉、游戏等），以分析日为锚点，多题材以逗号分隔。
    注意：题材与概念板块（dc_concept_board）为两套独立分类体系，编码规则不同。
    数据源：tushare dc_concept/dc_concept_cons。北交所(.BJ)股票无题材数据，此列固定显示 N/A。

  industry: |
    申万行业分类（如股份制银行、汽车零部件等），来自 tushare stock_basic。与『通达信行业』为两套独立行业分类体系，可交叉参考。

  is_st: |
    是否 ST/*ST（1=是，0=否）。默认导出可过滤 ST 股。

  close: |
    前复权收盘价（qfq）。OHLC 均基于 adj_factor 复权。

  pct_chg: |
    涨跌幅（%），相对前一交易日收盘价。

  vol: |
    成交量，导出单位：万手（原始手数 /10000）。

  amount: |
    成交额，导出单位：亿元（原始千元 /100000）。

  total_mv: |
    总市值，导出单位：亿元（原始万元 /10000）。

  pe_ttm: |
    滚动市盈率（TTM）。亏损或无财报时为 N/A。

  turnover_rate: |
    换手率（%），来自 daily_basic。

  kpattern: |
    K 线形态信号（单日至多一种展示枚举）。
    含阳包阴/阳克阴/墓碑线/避雷针等；阴包阳/阴克阳经回测映射为反向买入(contrarian_*)。

  kpattern_strength: |
   **当日触发 K 线形态的「质量评分」——在形态已触发的前提下，用 0.0～1.0 的连续值衡量这根 K 线有多「标准」、多「有力」。**
   1. 0.0 ~ 1.0，当日有形态，按该形态公式打分；
   2. --，涨跌停日或无形态触发；



  ema_12: |
    MACD 快线 EMA(12)，基于前复权收盘价。

  ema_26: |
    MACD 慢线 EMA(26)，基于前复权收盘价。

  dif: |
    MACD DIF = EMA(12) - EMA(26)。

  dea: |
    MACD DEA = EMA(DIF, 9)。

  macd_bar: |
    MACD 柱 = 2 × (DIF - DEA)。参数 (12,26,9)。

  macd_divergence: |
    MACD 结构背离（L1）。通达信 Level 2：DIF/DEA 金叉/死叉锚点 + 直接/隔峰线背(MDIF) ∧ 柱背；
    仅在结构形成 TG 日标注；10 bar 去重。

  macd_divergence_tradable: |
    **价格在涨（或跌），但 MACD 的动能有没有同步？**
    顶背离：价格又创新高（或接近前高），但 MACD 的 DIF 没有同步创新高（线背），红柱（MACD 柱）峰值也比前一段矮（柱背）。交易员理解： 还在涨，但「推升的力气」在减弱，像车还在往上冲，但油门已经松了。可能是见顶、至少要先洗一洗。
    底背离：价格又创新低，DIF 没有同步创新低，绿柱谷底比前一段浅（卖压在减弱）。交易员理解： 还在跌，但下跌动能衰竭，可能是阶段性底部或反弹前兆。

  macd_divergence_reject: |
    **L1：MACD 背离标准。 L2 ：skip_peak、tg_lag、zone_mismatch。**
    1.隔峰(skip_peak) ：  背离走的是 隔峰结构路径，不是「直接相邻两段」比较。交易员理解，信号在，但结构绕了一层，假突破/噪音概率更高，系统故意不放进「可交易池」。
    2.滞后(tg_lag) ： 结构确认日（TG）离段内 价格极值 太远。交易员理解，价格高点/低点过去太久才确认背离，信号「不新鲜」，追价或抄底时机已过。
    3.区域(zone_mismatch)：背离方向与 MACD 柱区域 不一致。 交易员理解，顶背离却已在绿柱区（或底背离却在红柱区），环境不对，可能是结构残留或已切换状态，不当标准反转信号用。



  macd_zone: |
    MACD 区域（B4）：MACD 柱 >0 为多头(bull)，<0 为空头(bear)。

  macd_turning_point: |
    MACD 转折点（B4）：DIF/DEA 金叉/死叉/近金叉/近死叉（123 同构 near_crossover 逻辑）。
    对应 DWS turning_point 列，与 macd_zone（bull/bear 区域）不同。

  macd_alert: |
    MACD 警惕：看连续 3 根 MACD 柱是否形成 V 形或 Λ 形拐点。
    - 下降趋势反弹（V 形）：柱线在下跌途中触底反弹（h[i-1] 为局部最小值），看多预警。
    - 上升趋势回落（Λ 形）：柱线在上涨途中冲顶回落（h[i-1] 为局部最大值），看空预警。


  macd_trend: |
    MACD 柱的「趋势方向灯」——看最近 5 根 K 上，B4 参数算出的 MACD 柱体是在抬高、走低还是横盘，输出三分类：上升 / 下降 / 走平。
    1.上升：近 5 根 B4 柱加权回归斜率 > 0.001
    2.下降：斜率 < -0.001
    3.走平：斜率在 ±0.001 内
    4.N/A，MACD 历史不够（约需 ≥27 根 bar）

  macd_trend_strength: |
    **MACD 柱的「动量速度表」——看最近 5 根 K 线，标准 MACD 柱（12,26,9）是在加速抬高、加速走低，还是几乎不动，并用 mean(|柱|) 去量纲，得到有符号、横截面可比的连续数值。**
    1. 正 → 近 5 根柱体加权上行（多头动量在加强）
    2. 负 → 近 5 根柱体加权下行（空头动量在加强）
    3. 接近 0 → 柱体近 5 根几乎横盘
    4. N/A，历史不够或 MACD 不可算（约需 ≥27 根 bar）
    ##使用方法：A. 同股前后对比（最稳）：今天强度 > 昨天 → 动量在加速（无论正负），红柱区里强度从正转负 → 多头动量衰竭（即使 macd_trend 仍显示上升）；B. 当日横截面排序：全市场按 MACD趋势强度 降序 → 柱体相对自身近期基线加速最快的票，升序 → 动量最弱/下沉最快，建议叠加 macd_zone=多头 或 macd_trend=上升，避免在绿柱区追「负值最大」；

  ma_5: |
    5 日/simple 移动平均线，前复权收盘价 SMA(5)。

  ma_10: |
    10 日/simple 移动平均线，前复权收盘价 SMA(10)。

  bias_ma5: |
    MA5 乖离率 (%) = (close - MA5) / MA5 × 100。

  bias_ma10: |
    MA10 乖离率 (%) = (close - MA10) / MA10 × 100。

  ma5_slope: |
    MA5 的 5-bar 线性回归斜率，归一化为%/日。

  ma10_slope: |
    MA10 的 5-bar 线性回归斜率，归一化为%/日。

  ma_alignment: |
    **ma_alignment =「MA5 / MA10 均线形态状态机」——把两条均线的相对位置（谁在谁上）和各自 5 日斜率方向（涨/跌/平）合成一个 10 值标签，告诉你当前处于多头、空头、过渡、缠绕还是横盘。**
    1. bull_strong：多头强势 — 两线同步上行，MA5>MA10，两斜率均上行；顺势持仓舒适区；
    2. bull_building：多头初建 — MA5 已拐头向上，MA5>MA10，MA5 上 / MA10 仍下（或 Layer3 单斜率偏多）；
    3. bull_weakening：多头衰竭 — MA5 先拐头向下，MA5>MA10 但 MA5 已走弱；死叉前兆；
    4. bull_rolling：多头翻转 — 两线均下行，MA5 仍在上但两线都在下；死叉边缘；
    5. bear_strong：空头强势 — 两线同步下行，MA5<MA10，两斜率均下行；观望/空仓区；
    6. bear_building：空头初建 — 死叉后 MA10 惯性未消，空头延续、下跌中继；
    7. bear_weakening：空头衰竭 — MA5 尝试上拐，空方减弱，关注反转；
    8. bear_rolling：空头翻转 — 两线均上行，MA5 仍在下但两线都在上；金叉边缘；
    9. sideways：均线走平 — 双斜率近零，横盘整理，等方向；
    10. tangle：均线缠绕 — 方向不明，频繁交叉，震荡市；
    ##上升-slope > 0.08 %/日、下降-slope < -0.08 %/日 、走平→ -0.08 ~ +0.08 %/日
    ###均线缠绕：|MA5 - MA10| / MA10 < 2.99%，且近 10 日 MA5/MA10 交叉 ≥ 2 次



  ma_turning_point: |
    均线转折点：MA5 与 MA10 的金叉/死叉/近金叉/近死叉。

  net_mf_amount: |
    主力净流入金额（万元），tushare moneyflow 口径。

  ddx: |
    DDX = (大单+超大单净买入量) / 总成交量。背离/alert 用此列；.BJ 无 moneyflow 为空。

  ddx2: |
    DDX2 = EMA(DDX, 5)。DDE 背离锚点慢线。

  dde_trend: |
    **「主力资金趋势方向灯」，不是单日大单强弱，而是：经过多层平滑后，主力净流入占流通市值这条「资金线」最近几天/几周是在抬升、走弱，还是几乎不动。**
    日线：对 DDX3 最近 5 根 K 线做线性回归，看斜率正负；周线：对 DDX3 最近 4 根 K 线做线性回归，看斜率正负。

  dde_trend_strength: |
    **dde_trend_strength 是 DDX2 近 5 根 K 线上的「加权上涨/下跌速度」，除以自己的平均绝对值后变成无单位有符号数：1. 正 → 大单动量线在抬升（资金侧偏强）；2. 负 → 大单动量线在走弱（资金侧偏弱）。3. 接近 0 → 近 5 根里 DDX2 几乎横盘**
    使用方式：
    1. 把它当「速度表」，不是「方向灯」，没有系统内置的「>0.5 就算强」这类阈值；用法是看符号 + 相对大小（同股前后对比、或当日全市场横截面排序）。spec 设计意图是去量纲、横截面可比。
    2. 按当日 dde_trend_strength 排序，找「大单动量相对自身近期基线加速最快/最慢」的票；

  dde_alert: |
    DDE 警惕：相邻两段 3 根 K 线上对 DDX2 做线性回归，检测斜率方向切换。
    相邻窗口重叠 2 根（67% 重叠），在噪声过滤和趋势检测时效性之间取得平衡。
    - 下降趋势反弹：DDX2 斜率由负转正，大单资金动向由流出转为流入，看多预警。
    - 上升趋势回落：DDX2 斜率由正转负，大单资金动向由流入转为流出，看空预警。

  dde_divergence: |
    DDE 结构背离（L1）。通达信 Level 2：DDX/DDX2 交叉锚点 + 线背∧柱背；
    顶区 DDX 尖刺过滤；TG 日标注；10 bar 去重。

  dde_divergence_tradable: |
    1.顶背离：价格创新高，但 DDX 没有同步创新高（大单推升力度不够），红柱区 DDX 峰值回落（柱背）。交易员理解： 价在涨，但主力大单并没有更强地买，甚至可能在涨里减仓。偏「价量（资金）背离」，对短线资金行为更敏感。
    2.底背离：价格创新低，但 DDX 没有同步创新低（大单杀跌减弱），绿柱区 DDX 谷底回升。交易员理解： 还在跌，但大单砸盘在减弱，可能有资金在低位承接。
    ###DDE 特有过滤：顶区若 DDX 出现孤立尖刺（单日脉冲），系统会过滤，减少假信号。北交所（.BJ）无资金流数据，DDE 整列为空。

  dde_divergence_reject: |
    **L1：MACD 背离标准。 L2 ：skip_peak、tg_lag、zone_mismatch。
    1.隔峰(skip_peak) ：  背离走的是 隔峰结构路径，不是「直接相邻两段」比较。交易员理解，信号在，但结构绕了一层，假突破/噪音概率更高，系统故意不放进「可交易池」。
    2.滞后(tg_lag) ： 结构确认日（TG）离段内 价格极值 太远。交易员理解，价格高点/低点过去太久才确认背离，信号「不新鲜」，追价或抄底时机已过。
    3.区域(zone_mismatch)：顶背离要求 DDX>0，底背离要求 DDX<0；不一致则剔除。。 交易员理解，顶背离却已在绿柱区（或底背离却在红柱区），环境不对，可能是结构残留或已切换状态，不当标准反转信号用。

  ma_vol_5: |
    5 期均量（vol 的 SMA）。日线导出为 5 日均量(万手)；周线为 5 周均量(万手)。

  pct_vol_rank: |
    当前 MA5_vol 在 120 bar 滚动窗内的百分位排名 [0,100]。

  vol_zone: |
   **当前这只股票的 5 日均量，在最近 120 根 K 线里，算「爆量区」「地量区」还是「正常区」？
    1. 爆量：进入，连续 2 日 pct_vol_rank > 90；退出，连续 2 日 pct_vol_rank < 75；
    2. 地量：进入，连续 5 日 pct_vol_rank < 10；退出，连续 2 日 pct_vol_rank > 25；
    3. 正常：非爆量非地量。
    进出阈值不对称形成迟滞，防止边界反复切换。

  vol_trend: |
    取 最近 5 根 bar 的原始 vol，做斜率 / mean(|vol|) 归一化（_slope_over_mean_abs）：
    1.斜率 > 0.001 → expanding（放量）
    2.斜率 < -0.001 → shrinking（缩量）
    3.[-0.008, 0.008] → flat（平量）

  volume_ratio: |
    量比 = vol / MA5_vol（当日或当周成交量相对均量倍数）。

  vol_ratio: |
    量比（与 volume_ratio 同义，视图别名）。

  vol_trend_strength: |
    **最近一段里，成交量变化有多「猛」？方向是放大还是缩小？**
    1. > 0，量在抬升，越大越强
    2. < 0，量在下降，
    3. ≈ 0，几乎走平
    4. N/A，历史不足或窗内有效 vol 不够


  vol_divergence: |
    **价格和成交量，在最近 60 根 K 线里是否「不同步」？**
    1. 顶背离：价格高位量缩。股价还在高位区，但成交量相对 60 日峰值已经缩了——「价涨（或高位）量跟不上」，常见于见顶前段或假突破。
    2. 底背离：价格低位量回升>10%。价还在低位区，但量相对 60 日谷底已明显放大——「跌不动 + 有资金承接」的初步信号。
    3. 其他：同步。
    与 MACD/DDE 的「结构背离」不是同一套算法——量价背离仍用 60 日 rolling 窗 经典法


  price_position_60d: |
    60 日价格滚动分位(%) = (close - 60d_low) / (60d_high - 60d_low) × 100，值域 [0,100]。

  price_position_120d: |
    120 日价格滚动分位(%)，公式同 60 日，窗口 120 bar。

  price_position_250d: |
    250 日价格滚动分位(%)，公式同 60 日，窗口 250 bar。

  vol_signal: |
   ** vol_signal 是 ADS 消费层复合信号：在 SQL 视图里把「价格位置 + 量能 + MACD 拐点 + 量价背离」当天同时满足的规则，压成 5 种命名事件；不是 DWS Calculator 单独算出来的字段。**
    1. 突破确认：60 日价格滚动分位 > 98%（价在极高位区间）且 量比 > 1.5（相对近 5 日均量明显放大）,价已经推到短期区间顶部 + 量也跟上 → 突破有量配合，偏「真突破/加速段」叙事。
    2. 放量滞涨：60 日价格分位 > 85%（仍在高位区），量能区 = 爆量（120 日量能百分位进爆量迟滞区），当日涨跌幅在 -2% ~ +2%（几乎横着走）。高位爆量但不涨 — 大量换手、价格推不动。经典语义是滞涨、派发、高潮量，不是健康上攻。
    3. 缩量止跌：60 日价格分位 < 15%（价在极低位区间），量能区 = 地量（120 日量能百分位进地量迟滞区）。低位 + 地量 — 卖压衰竭、交投冷清。偏「跌不动、可能在磨底」的初步观察，不是反转确认。
    4. 金叉量弱：MACD 金叉，量价顶背离。指标面刚翻多（金叉），但 量价 rolling 背离 说「价相对高位、量在缩/不配合」→ 金叉质量打折，偏诱多或弱反弹。
    5. 死叉量弱：MACD 死叉，量价底背离。指标面翻空（死叉），但 量价底背离 说「价在相对低位、量在回升」→ 杀跌动能可能不足，偏「死叉但不那么致命」。